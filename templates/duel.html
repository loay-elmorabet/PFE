<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Configuration du Duel - Football Analytics</title>
  </head>

  <body
    class="bg-[#f4f5f7] text-[#1e293b] font-sans min-h-screen flex items-center justify-center p-4 md:p-6"
  >
    <div
      class="max-w-4xl w-full bg-white p-6 md:p-10 rounded-[24px] border border-gray-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)]"
    >
      <div class="text-center mb-8">
        <h1 class="text-3xl font-black tracking-tight text-[#0f172a]">
          Comparez deux Joueurs
        </h1>
      </div>

      <form method="GET" action="{{ url_for('comparer') }}" class="space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
          <div
            class="space-y-4 p-5 rounded-2xl bg-gray-50/40 border border-gray-100 relative"
          >
            <h3
              class="text-sm font-bold text-[#0f172a] tracking-tight flex items-center gap-2 mb-2"
            >
              <span class="w-2 h-2 rounded-full bg-[#10b981]"></span>
              Premier Joueur (J1)
            </h3>

            <div class="space-y-1.5">
              <label
                for="saison-p1"
                class="text-[10px] font-bold uppercase tracking-wider text-gray-400 block pl-1"
                >Saison</label
              >
              <div class="relative">
                <select
                  name="season1"
                  id="saison-p1"
                  class="w-full bg-white border border-gray-200 focus:border-[#10b981] focus:ring-2 focus:ring-[#10b981]/10 text-sm font-semibold rounded-xl p-3 outline-none appearance-none cursor-pointer text-[#334155]"
                >
                  <option value="">Choisir une année</option>
                  <option value="2022">2022</option>
                  <option value="2023">2023</option>
                  <option value="2024">2024</option>
                </select>
                <div
                  class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-4 w-4"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2.5"
                      d="M19 9l-7 7-7-7"
                    />
                  </svg>
                </div>
              </div>
            </div>

            <div class="space-y-1.5">
              <label
                for="ligue-p1"
                class="text-[10px] font-bold uppercase tracking-wider text-gray-400 block pl-1"
                >Ligue</label
              >
              <div class="relative">
                <select
                  name="league1"
                  id="ligue-p1"
                  disabled
                  class="w-full bg-white border border-gray-200 text-sm font-semibold rounded-xl p-3 outline-none appearance-none transition-all cursor-pointer text-[#334155] disabled:opacity-50 disabled:bg-gray-100 disabled:cursor-not-allowed focus:border-[#10b981] focus:ring-2 focus:ring-[#10b981]/10"
                >
                  <option value="">Ligue</option>
                </select>
                <div
                  class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-4 w-4"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2.5"
                      d="M19 9l-7 7-7-7"
                    />
                  </svg>
                </div>
              </div>
            </div>

            <div class="space-y-1.5">
              <label
                for="equipe-p1"
                class="text-[10px] font-bold uppercase tracking-wider text-gray-400 block pl-1"

                <select
                  name="team1"
                  id="equipe-p1"
                  disabled
                  class="w-full bg-white border border-gray-200 text-sm font-semibold rounded-xl p-3 outline-none appearance-none transition-all cursor-pointer text-[#334155] disabled:opacity-50 disabled:bg-gray-100 disabled:cursor-not-allowed focus:border-[#10b981] focus:ring-2 focus:ring-[#10b981]/10"
                ></select>
                <div
                  class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400"

                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2.5"
                      d="M19 9l-7 7-7-7"
                    />
                  </svg>
                </div>
              </div>
            </div>

            <div class="space-y-1.5">

                <select
                  name="player1"
                  id="joueur-p1"
                  disabled
                  class="w-full bg-white border border-gray-200 text-sm font-semibold rounded-xl p-3 outline-none appearance-none transition-all cursor-pointer text-[#334155] disabled:opacity-50 disabled:bg-gray-100 disabled:cursor-not-allowed focus:border-[#10b981] focus:ring-2 focus:ring-[#10b981]/10"
                ></select>
                <div
                  class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-4 w-4"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2.5"
                      d="M19 9l-7 7-7-7"
                    />
                  </svg>
                </div>
              </div>
            </div>
          </div>

          <div
            class="space-y-4 p-5 rounded-2xl bg-gray-50/40 border border-gray-100 relative"
          >
            <h3
              class="text-sm font-bold text-[#0f172a] tracking-tight flex items-center gap-2 mb-2"
            >
              <span class="w-2 h-2 rounded-full bg-slate-400"></span>
              Deuxième Joueur (J2)
            </h3>

            <div class="space-y-1.5">
              <label
                for="saison-p2"
                class="text-[10px] font-bold uppercase tracking-wider text-gray-400 block pl-1"
                >Saison</label
              >
              <div class="relative">
                <select
                  name="season2"
                  id="saison-p2"
                  class="w-full bg-white border border-gray-200 focus:border-[#10b981] focus:ring-2 focus:ring-[#10b981]/10 text-sm font-semibold rounded-xl p-3 outline-none appearance-none cursor-pointer text-[#334155]"
                >
                  <option value="">Choisir une année</option>
                  <option value="2022">2022</option>
                  <option value="2023">2023</option>
                  <option value="2024">2024</option>
                </select>
                <div
                  class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400"

                  <svg

                    stroke="currentColor"
                  >
                    <path

                      d="M19 9l-7 7-7-7"
                    />
                  </svg>
                </div>

            <div class="space-y-1.5">
              <label

                >Ligue</label

              <div class="relative">
                <select
                  name="league2"
                  id="ligue-p2"
                  disabled
                  class="w-full bg-white border border-gray-200 text-sm font-semibold rounded-xl p-3 outline-none appearance-none transition-all cursor-pointer text-[#334155] disabled:opacity-50 disabled:bg-gray-100 disabled:cursor-not-allowed focus:border-[#10b981] focus:ring-2 focus:ring-[#10b981]/10"
                >
                  <option value="">Ligue</option>
                </select>
                <div
                  class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400"
                >
                  <svg

                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path

                      d="M19 9l-7 7-7-7"
                    />
                  </svg>
                </div>
              </div>
            </div>

            <div class="space-y-1.5">
              <label
                for="equipe-p2"
                class="text-[10px] font-bold uppercase tracking-wider text-gray-400 block pl-1"
                >Équipe</label
              >
              <div class="relative">
                <select
                  name="team2"
                  id="equipe-p2"
                  disabled

                ></select>
                <div
                  class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-4 w-4"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2.5"
                      d="M19 9l-7 7-7-7"
                    />
                  </svg>
                </div>
              </div>
            </div>

            <div class="space-y-1.5">
              <label
                for="joueur-p2"
                class="text-[10px] font-bold uppercase tracking-wider text-gray-400 block pl-1"
                >Joueur</label
              >
              <div class="relative">
                <select
                  name="player2"
                  id="joueur-p2"
                  disabled
                  class="w-full bg-white border border-gray-200 text-sm font-semibold rounded-xl p-3 outline-none appearance-none transition-all cursor-pointer text-[#334155] disabled:opacity-50 disabled:bg-gray-100 disabled:cursor-not-allowed focus:border-[#10b981] focus:ring-2 focus:ring-[#10b981]/10"
                ></select>
                <div
                  class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-4 w-4"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2.5"
                      d="M19 9l-7 7-7-7"
                    />
                  </svg>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div
          class="pt-6 border-t border-gray-100 flex flex-col sm:flex-row gap-3"
        >
          <button
            type="submit"
            class="w-full sm:w-3/4 order-1 sm:order-2 py-3.5 px-4 bg-[#10b981] hover:bg-[#0f9f6e] text-white font-extrabold text-sm rounded-xl transition-all duration-300 shadow-sm hover:shadow-[0_10px_20px_rgba(16,185,129,0.15)] text-center uppercase tracking-wide"
          >
            Lancer la comparaison
          </button>
        </div>
      </form>
    </div>

    <script src="{{ url_for('static', filename='duel.js') }}"></script>

    <script>
      function activerTousLesChamps() {
        document.querySelectorAll("select").forEach((select) => {
          select.disabled = false;
        });
      }
    </script>
  </body>
</html>
